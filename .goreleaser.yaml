version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mcprt
    main: ./cmd/mcprt
    binary: mcprt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: mcprt
    format: tar.gz
    name_template: "mcprt_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - contrib/launchd/com.mcprt.daemon.plist

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"
    - title: Other
      order: 999

release:
  github:
    owner: victorqnguyen
    name: mcprt
  draft: true
  prerelease: auto
  name_template: "mcprt {{.Version}}"
