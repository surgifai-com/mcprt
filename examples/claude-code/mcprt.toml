[runtime]
listen       = "127.0.0.1:9090"
log_level    = "info"
grace_period = "5s"

# --- Example: Python MCP server that accepts --port ---
[server.my-python-mcp]
exec        = ["/path/to/.venv/bin/my-mcp-server"]
args        = ["--port", "${MCPRT_PORT}", "--host", "127.0.0.1"]
health_type = "tcp"

# --- Example: Python server that reads port from an env var ---
[server.my-env-port-mcp]
exec        = ["/path/to/.venv/bin/python", "-m", "my_mcp.server"]
working_dir = "/path/to/project"
env         = { PORT = "${MCPRT_PORT}" }
health_type = "tcp"
health_timeout = "15s"
acknowledged_stdio_safe = true  # python binary; confirm this server binds HTTP

# --- Example: Node.js MCP server ---
[server.my-node-mcp]
exec        = ["/opt/homebrew/bin/node", "/path/to/dist/index.js"]
working_dir = "/path/to/project"
env         = { PORT = "${MCPRT_PORT}", NODE_ENV = "production" }
health_type = "tcp"
acknowledged_stdio_safe = true  # node binary; confirm this server binds HTTP

# --- Example: server with hardcoded port (reads from its own config file) ---
[server.my-static-port-mcp]
exec           = ["/path/to/.venv/bin/my-server", "serve"]
working_dir    = "/path/to/project"
port           = 8765           # static pin — skip ${MCPRT_PORT} substitution
health_type    = "tcp"
health_timeout = "30s"          # slow cold-start (e.g. ML model load)
